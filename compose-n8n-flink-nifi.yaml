services:
  zookeeper:
    image: zookeeper:3.9
    container_name: nifi-zookeeper
    restart: always
    environment:
      - ZOO_MY_ID=1
      - ZOO_SERVERS=server.1=zookeeper:2888:3888;2181
    volumes:
      - zookeeper_data:/data
      - zookeeper_datalog:/datalog
    networks:
      - n8n_flink_bridge

  nifi-1:
    image: apache/nifi:1.11.4
    container_name: nifi-node-1
    restart: always
    ports:
      - "8080:8080"
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - NIFI_WEB_HTTPS_PORT=""
      - NIFI_CLUSTER_IS_NODE=true
      - NIFI_CLUSTER_NODE_PROTOCOL_PORT=8082
      - NIFI_CLUSTER_NODE_ADDRESS=nifi-1
      - NIFI_ZK_CONNECT_STRING=zookeeper:2181
      - NIFI_ELECTION_MAX_WAIT=30 sec
      - NIFI_CLUSTER_PROTOCOL_IS_SECURE=false
    volumes:
      - nifi-1-conf:/opt/nifi/nifi-current/conf
      - nifi-1-database:/opt/nifi/nifi-current/database_repository
      - nifi-1-flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi-1-content:/opt/nifi/nifi-current/content_repository
      - nifi-1-provenance:/opt/nifi/nifi-current/provenance_repository
      - nifi-1-state:/opt/nifi/nifi-current/state
    networks:
      - n8n_flink_bridge
    depends_on:
      - zookeeper

  nifi-2:
    image: apache/nifi:1.11.4
    container_name: nifi-node-2
    restart: always
    ports:
      - "8081:8080"
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - NIFI_WEB_HTTPS_PORT=""
      - NIFI_CLUSTER_IS_NODE=true
      - NIFI_CLUSTER_NODE_PROTOCOL_PORT=8082
      - NIFI_CLUSTER_NODE_ADDRESS=nifi-2
      - NIFI_ZK_CONNECT_STRING=zookeeper:2181
      - NIFI_ELECTION_MAX_WAIT=30 sec
      - NIFI_CLUSTER_PROTOCOL_IS_SECURE=false
    volumes:
      - nifi-2-conf:/opt/nifi/nifi-current/conf
      - nifi-2-database:/opt/nifi/nifi-current/database_repository
      - nifi-2-flowfile:/opt/nifi/nifi-current/flowfile_repository
      - nifi-2-content:/opt/nifi/nifi-current/content_repository
      - nifi-2-provenance:/opt/nifi/nifi-current/provenance_repository
      - nifi-2-state:/opt/nifi/nifi-current/state
    networks:
      - n8n_flink_bridge
    depends_on:
      - zookeeper
  # Flink JobManager: The master node
  jobmanager:
    image: flink:1.20.3-java17
    ports:
      - "9091:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
    volumes:
      #- ./conf:/opt/flink/conf
      - flink_data:/tmp/
    networks:
      - n8n_flink_bridge

  # Flink TaskManager: The worker node
  taskmanager:
    image: flink:1.20.3-java17
    depends_on:
      - jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 4
    volumes:
      #- ./conf:/opt/flink/conf
      - flink_data:/tmp/
    networks:
      - n8n_flink_bridge

  kafka:     
    image: 'apache/kafka:latest'
    environment:
      # Unique ID for the node within the cluster
      - KAFKA_NODE_ID=0
      # Roles for the process: act as both broker and controller
      - KAFKA_PROCESS_ROLES=broker,controller
      # Define listeners for different types of traffic
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      # Map security protocols to listener names
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      # Voters for the controller quorum (nodeId@host:port)
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # Which listener the controller should use
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # The address clients (like n8n or Flink) use to connect
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      # Required for single-node development setup
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
    networks:
      - n8n_flink_bridge

  # n8n Automation Tool
  n8n:
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_SECURE_COOKIE=false  # Set to false if you are NOT using HTTPS/SSL
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_flink_bridge

# Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - DYNAMIC_CONFIG_ENABLED=true
    networks:
      - n8n_flink_bridge

networks:
  n8n_flink_bridge:
    driver: bridge

volumes:
  n8n_data:
  flink_data:
  zookeeper_data:
  zookeeper_datalog:
  nifi-1-conf:
  nifi-1-database:
  nifi-1-flowfile:
  nifi-1-content:
  nifi-1-provenance:
  nifi-1-state:
  nifi-2-conf:
  nifi-2-database:
  nifi-2-flowfile:
  nifi-2-content:
  nifi-2-provenance:
  nifi-2-state: